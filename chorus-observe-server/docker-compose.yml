# Chorus Observe — Self-hosted Deployment
# Run: docker compose up -d
#
# Services:
#   - PostgreSQL + TimescaleDB (relational data, metrics)
#   - ClickHouse (columnar span/trace storage)
#   - Chorus Observe Server (REST API + OTLP gRPC/HTTP)
#   - Chorus Studio (Next.js UI)
#
# Note: OTLP Collector is optional. Chorus Observe Server accepts
# OTLP directly on gRPC 4317 and HTTP 4318 /v1/traces.

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: chorus_observe
      POSTGRES_USER: chorus
      POSTGRES_PASSWORD: chorus
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chorus -d chorus_observe"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: chorus_observe
      CLICKHOUSE_USER: chorus
      CLICKHOUSE_PASSWORD: chorus
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
      - ./src/main/resources/db/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chorus-observe:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "4317:4317"
      - "4318:4318"
    environment:
      CHORUS_OBSERVE_DATABASE_URL: jdbc:postgresql://postgres:5432/chorus_observe
      CHORUS_OBSERVE_DATABASE_USERNAME: chorus
      CHORUS_OBSERVE_DATABASE_PASSWORD: chorus
      CHORUS_OBSERVE_DATABASE_MIGRATE_ON_STARTUP: "true"
      CHORUS_OBSERVE_CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/chorus_observe
      CHORUS_OBSERVE_CLICKHOUSE_USERNAME: chorus
      CHORUS_OBSERVE_CLICKHOUSE_PASSWORD: chorus
      CHORUS_OBSERVE_GRPC_ENABLED: "true"
      CHORUS_OBSERVE_GRPC_PORT: "4317"
      JWT_SECRET: ${JWT_SECRET:-chorus-observe-change-this-in-production-to-a-64-char-random-string}
    # Uncomment for TLS:
    # volumes:
    #   - ./certs:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - chorus-network

volumes:
  pgdata:
  chdata:

networks:
  chorus-network:
    driver: bridge
