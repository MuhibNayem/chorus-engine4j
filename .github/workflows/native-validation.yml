name: GraalVM Native Image Validation

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ '**' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-validate:
    name: Validate Native Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-native-

      - name: Run Spring Boot AOT Processing
        run: ./gradlew :chorus-engine-spring-boot-sample:processAot --no-daemon

      - name: Compile Native Binary
        run: ./gradlew :chorus-engine-spring-boot-sample:nativeCompile --no-daemon

      - name: Verify Native Executable — CLI pipeline (mock LLM, end-to-end)
        run: |
          # chorus-code is a run-to-completion CLI when started without --spring.profiles.active=web.
          # Run it non-interactively with CHORUS_PROVIDER=mock so the full LLM/agent pipeline
          # exercises in the native image without requiring any API keys.
          # --spring.profiles.active=dev also sets the Spring-managed LLM to mock.
          BINARY="chorus-engine-spring-boot-sample/build/native/nativeCompile/chorus-code"
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: Native binary not found at $BINARY"
            exit 1
          fi
          chmod +x "$BINARY"

          START_NS=$(date +%s%N)
          set +e
          OUTPUT=$(CHORUS_PROVIDER=mock "$BINARY" --spring.profiles.active=dev -p "hello" --output-format text </dev/null 2>&1)
          EXIT_CODE=$?
          set -e
          END_NS=$(date +%s%N)
          ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))

          echo "----- chorus-code output -----"
          echo "$OUTPUT"
          echo "------------------------------"

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "ERROR: chorus-code exited with non-zero status ($EXIT_CODE)"
            exit 1
          fi

          # The mock provider replies with a known marker — its presence proves the
          # full LLM/agent pipeline ran end-to-end inside the native image.
          if ! echo "$OUTPUT" | grep -qi "Ready to help"; then
            echo "ERROR: expected mock response marker ('Ready to help') not found in output"
            exit 1
          fi

          echo "✅ CLI mode: native pipeline ran successfully in ${ELAPSED_MS}ms (exit 0)"
          if [ "$ELAPSED_MS" -gt 500 ]; then
            echo "::warning::Startup+run time (${ELAPSED_MS}ms) exceeds the 500ms CI threshold (target is <100ms on bare metal)"
          fi

      # NOTE: Web mode (--spring.profiles.active=web) is validated via JVM deployment only.
      # GraalVM native images evaluate @ConditionalOnWebApplication at AOT compile time — the
      # condition cannot be re-evaluated at runtime when switching application type. The native
      # binary is locked to WebApplicationType.NONE (CLI) by processAot's system property.
      # Web deployment uses: java -jar chorus-code.jar --spring.profiles.active=web

      - name: Upload Verified Native Binary
        uses: actions/upload-artifact@v4
        with:
          name: chorus-engine-native-linux-amd64
          path: chorus-engine-spring-boot-sample/build/native/nativeCompile/chorus-code
          if-no-files-found: error
