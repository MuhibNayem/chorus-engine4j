name: Java CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [25]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'oracle'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Compile
        run: ./gradlew compileJava --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results-jdk-${{ matrix.java }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

  native-image:
    name: Native Image (GraalVM)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-native-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-native-

      - name: Compile sample with AOT processing
        run: ./gradlew :chorus-engine-spring-boot-sample:processAot --no-daemon

      - name: Build native image
        run: ./gradlew :chorus-engine-spring-boot-sample:nativeCompile --no-daemon

      - name: Measure startup time
        run: |
          BINARY="chorus-engine-spring-boot-sample/build/native/nativeCompile/chorus-engine-sample"
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: Native binary not found at $BINARY"
            echo "Build artifacts present:"
            find chorus-engine-spring-boot-sample/build/native -type f 2>/dev/null || echo "  (none)"
            exit 1
          fi
          chmod +x "$BINARY"
          PORT=18080
          START_NS=$(date +%s%N)
          "$BINARY" --server.port=$PORT > /tmp/chorus-sample.log 2>&1 &
          PID=$!
          # Poll actuator health — starter includes spring-boot-starter-actuator
          READY=false
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:${PORT}/actuator/health" > /dev/null 2>&1; then
              READY=true
              break
            fi
            if ! kill -0 $PID 2>/dev/null; then
              echo "ERROR: Application exited unexpectedly"
              cat /tmp/chorus-sample.log
              exit 1
            fi
            sleep 0.25
          done
          END_NS=$(date +%s%N)
          ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))
          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
          if [ "$READY" = "false" ]; then
            echo "ERROR: Application did not become healthy within 15 seconds"
            cat /tmp/chorus-sample.log
            exit 1
          fi
          echo "Startup time: ${ELAPSED_MS}ms"
          # Target is <100ms on bare metal; CI runners are slower — warn only
          if [ "$ELAPSED_MS" -gt 500 ]; then
            echo "Warning: startup ${ELAPSED_MS}ms exceeds 500ms CI threshold (bare-metal target: <100ms)"
          fi

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: chorus-engine-native-linux-amd64
          path: chorus-engine-spring-boot-sample/build/native/nativeCompile/chorus-engine-sample
          if-no-files-found: error
