name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: 'gradle'

      - name: Verify secrets are present
        run: |
          if [ -z "${{ secrets.MAVEN_CENTRAL_USERNAME }}" ]; then
            echo "::error::Secret MAVEN_CENTRAL_USERNAME is not set"
            exit 1
          fi
          if [ -z "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" ]; then
            echo "::error::Secret MAVEN_CENTRAL_PASSWORD is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SIGNING_KEY_ID }}" ]; then
            echo "::error::Secret SIGNING_KEY_ID is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SIGNING_PASSWORD }}" ]; then
            echo "::error::Secret SIGNING_PASSWORD is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SIGNING_SECRET_KEY }}" ]; then
            echo "::error::Secret SIGNING_SECRET_KEY is not set"
            echo "::error::Run: gpg --armor --export-secret-keys KEY_ID | base64 -w0"
            exit 1
          fi
          echo "All required secrets are present"

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew test --no-daemon

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-daemon
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
