name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build, Test, Publish & Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if already published
        id: check
        run: |
          PKG="${{ steps.version.outputs.version }}"
          if npm view "chorus-engine@$PKG" version 2>/dev/null | grep -q "$PKG"; then
            echo "already-published=true" >> $GITHUB_OUTPUT
            echo "Version $PKG already exists on npm — skipping publish."
          else
            echo "already-published=false" >> $GITHUB_OUTPUT
            echo "Version $PKG is new — proceeding with publish."
          fi

      - name: Install
        if: steps.check.outputs.already-published == 'false'
        run: npm ci

      - name: Type check
        if: steps.check.outputs.already-published == 'false'
        run: npm run typecheck

      - name: Build
        if: steps.check.outputs.already-published == 'false'
        run: npm run build

      - name: Test
        if: steps.check.outputs.already-published == 'false'
        run: npm run test:coverage

      - name: Verify build output
        if: steps.check.outputs.already-published == 'false'
        run: |
          test -f dist/index.js || (echo "Missing dist/index.js" && exit 1)
          test -f dist/index.d.ts || (echo "Missing dist/index.d.ts" && exit 1)
          test -f dist/agent/index.js || (echo "Missing dist/agent/index.js" && exit 1)
          test -f dist/agent/index.d.ts || (echo "Missing dist/agent/index.d.ts" && exit 1)
          test -f dist/swarm/index.js || (echo "Missing dist/swarm/index.js" && exit 1)
          test -f dist/swarm/index.d.ts || (echo "Missing dist/swarm/index.d.ts" && exit 1)
          test -f dist/llm/index.js || (echo "Missing dist/llm/index.js" && exit 1)
          test -f dist/llm/index.d.ts || (echo "Missing dist/llm/index.d.ts" && exit 1)
          test -f dist/tools/index.js || (echo "Missing dist/tools/index.js" && exit 1)
          test -f dist/tools/index.d.ts || (echo "Missing dist/tools/index.d.ts" && exit 1)
          test -f dist/evals/index.js || (echo "Missing dist/evals/index.js" && exit 1)
          test -f dist/evals/index.d.ts || (echo "Missing dist/evals/index.d.ts" && exit 1)
          test -f dist/mcp/index.js || (echo "Missing dist/mcp/index.js" && exit 1)
          test -f dist/mcp/index.d.ts || (echo "Missing dist/mcp/index.d.ts" && exit 1)
          test -f dist/harness/index.js || (echo "Missing dist/harness/index.js" && exit 1)
          test -f dist/harness/index.d.ts || (echo "Missing dist/harness/index.d.ts" && exit 1)
          test -f dist/graph/index.js || (echo "Missing dist/graph/index.js" && exit 1)
          test -f dist/graph/index.d.ts || (echo "Missing dist/graph/index.d.ts" && exit 1)
          echo "✓ All build outputs verified"

      - name: Create git tag
        if: steps.check.outputs.already-published == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish to npm
        if: steps.check.outputs.already-published == 'false'
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.check.outputs.already-published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
