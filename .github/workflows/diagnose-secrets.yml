name: Diagnose Secrets

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - name: Check required secrets
        run: |
          echo "Checking which secrets are set..."
          MISSING=0

          if [ -z "$MAVEN_CENTRAL_USERNAME" ]; then
            echo "❌ MAVEN_CENTRAL_USERNAME is MISSING"
            MISSING=$((MISSING + 1))
          else
            echo "✅ MAVEN_CENTRAL_USERNAME is set"
          fi

          if [ -z "$MAVEN_CENTRAL_PASSWORD" ]; then
            echo "❌ MAVEN_CENTRAL_PASSWORD is MISSING"
            MISSING=$((MISSING + 1))
          else
            echo "✅ MAVEN_CENTRAL_PASSWORD is set"
          fi

          if [ -z "$SIGNING_KEY_ID" ]; then
            echo "❌ SIGNING_KEY_ID is MISSING"
            MISSING=$((MISSING + 1))
          else
            echo "✅ SIGNING_KEY_ID is set"
          fi

          if [ -z "$SIGNING_PASSWORD" ]; then
            echo "❌ SIGNING_PASSWORD is MISSING"
            MISSING=$((MISSING + 1))
          else
            echo "✅ SIGNING_PASSWORD is set"
          fi

          if [ -z "$SIGNING_SECRET_KEY" ]; then
            echo "❌ SIGNING_SECRET_KEY is MISSING"
            MISSING=$((MISSING + 1))
          else
            echo "✅ SIGNING_SECRET_KEY is set"
            # Check if it looks like base64
            if echo "$SIGNING_SECRET_KEY" | base64 -d >/dev/null 2>&1; then
              echo "   → Value appears to be valid base64"
            else
              echo "   → Value does NOT appear to be valid base64"
            fi
          fi

          if [ $MISSING -gt 0 ]; then
            echo ""
            echo "$MISSING secret(s) missing."
            echo "Go to: https://github.com/$GITHUB_REPOSITORY/settings/secrets/actions"
            echo ""
            echo "To generate SIGNING_SECRET_KEY:"
            echo "  gpg --armor --export-secret-keys YOUR_KEY_ID | base64 -w0"
            exit 1
          fi

          echo ""
          echo "All required secrets are present."
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_SECRET_KEY: ${{ secrets.SIGNING_SECRET_KEY }}
